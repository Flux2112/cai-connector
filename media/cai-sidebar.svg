<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <title>CAI Connector</title>
  <!-- Scale content ~1.5x around its visual center (11.5, 12) so the icon
       fills more of the 24x24 activity-bar slot. -->
  <g transform="translate(12 12) scale(1.5) translate(-11.5 -12)">
  <!-- Cloud outline -->
  <path d="M6.5 10.5
           a3.5 3.5 0 0 1 6.7 -1.2
           a2.6 2.6 0 0 1 3.9 2.2
           a2.8 2.8 0 0 1 -0.6 5.5
           H6.8
           a2.8 2.8 0 0 1 -0.3 -6.5
           Z" />
  <!-- CAI text centered on the cloud's straight baseline midpoint (x≈11.65),
       vertically centered within the cloud interior (y≈12.55) -->
  <text x="11.3" y="12.55"
        font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="5"
        font-weight="700"
        text-anchor="middle"
        dominant-baseline="central"
        fill="currentColor"
        stroke="none"
        letter-spacing="0.2">CAI</text>
  </g>
</svg>
